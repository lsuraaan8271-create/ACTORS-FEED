<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>San Calculation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:#050816;

color:white;

}

/* Premium Aurora Background */

body::before{

content:"";

position:fixed;

width:700px;

height:700px;

background:#7c3aed;

filter:blur(170px);

top:-250px;

left:-250px;

opacity:.5;

animation:move1 12s infinite alternate;

z-index:-2;

}

body::after{

content:"";

position:fixed;

width:700px;

height:700px;

background:#00d4ff;

filter:blur(170px);

bottom:-250px;

right:-250px;

opacity:.4;

animation:move2 13s infinite alternate;

z-index:-2;

}

@keyframes move1{

100%{

transform:translate(150px,120px);

}

}

@keyframes move2{

100%{

transform:translate(-120px,-120px);

}

}

.calculator{

width:390px;

padding:28px;

border-radius:35px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.15);

box-shadow:0 0 60px rgba(0,212,255,.25);

}

.logo{

text-align:center;

font-size:30px;

font-weight:800;

margin-bottom:25px;

background:linear-gradient(90deg,#00d4ff,#8b5cf6,#facc15);

-webkit-background-clip:text;

color:transparent;

}

.display{

width:100%;

height:90px;

border:none;

outline:none;

border-radius:20px;

padding:20px;

font-size:34px;

text-align:right;

background:rgba(255,255,255,.1);

color:white;

margin-bottom:25px;

}

.buttons{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:15px;

}

button{

height:70px;

border:none;

border-radius:18px;

font-size:22px;

font-weight:700;

cursor:pointer;

transition:.25s;

background:rgba(255,255,255,.08);

color:white;

backdrop-filter:blur(15px);

}

button:hover{

transform:translateY(-4px);

box-shadow:0 0 25px rgba(0,212,255,.4);

}

.operator{

background:linear-gradient(135deg,#06b6d4,#7c3aed);

}

.equal{

background:linear-gradient(135deg,#16a34a,#00d4ff);

grid-column:span 2;

}

.clear{

background:linear-gradient(135deg,#ef4444,#f97316);

}

</style>

</head>

<body>

<div class="calculator">

<div class="logo">

<i class="fa-solid fa-calculator"></i>

San Calculation

</div>

<input
type="text"
id="display"
class="display"
readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">AC</button>

<button onclick="backspace()">
<i class="fa-solid fa-delete-left"></i>
</button>

<button onclick="append('%')">%</button>

<button class="operator" onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>

<button onclick="append('8')">8</button>

<button onclick="append('9')">9</button>

<button class="operator" onclick="append('*')">×</button>

<button onclick="append('4')">4</button>

<button onclick="append('5')">5</button>

<button onclick="append('6')">6</button>

<button class="operator" onclick="append('-')">−</button>

<button onclick="append('1')">1</button>

<button onclick="append('2')">2</button>

<button onclick="append('3')">3</button>

<button class="operator" onclick="append('+')">+</button>

<button onclick="append('0')">0</button>

<button onclick="append('.')">.</button>

<button class="equal" onclick="calculate()">=</button>

</div>

</div><!DOCTYPE html>
